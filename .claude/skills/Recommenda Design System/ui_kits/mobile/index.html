<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recommenda — Mobile UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat+Brush&display=swap">
<style>
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:var(--cream-200);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--font-sans)}
  #root>div{transition:transform .1s ease}
  #root button{font-family:var(--font-sans)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<script src="icons.jsx"></script>
<script src="parts.jsx"></script>
</head><body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Splash.jsx"></script>
<script type="text/babel" src="Feed.jsx"></script>
<script type="text/babel" src="Detail.jsx"></script>
<script type="text/babel" src="AddRec.jsx"></script>
<script type="text/babel" src="Profile.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.RecoApp));
  const fit = () => {
    const el = document.querySelector('#root > div');
    if (!el) return;
    const s = Math.min(1, (window.innerHeight - 32) / 874, (window.innerWidth - 32) / 402);
    el.style.transform = 'scale(' + s + ')';
    el.style.transformOrigin = 'center center';
  };
  const iv = setInterval(fit, 150); setTimeout(() => clearInterval(iv), 2000);
  window.addEventListener('resize', fit);
</script>
</body></html>
