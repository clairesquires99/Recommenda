<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:22px 24px;background:var(--color-bg);font-family:var(--font-sans);color:var(--ink-800)}
  .r{display:flex;align-items:baseline;gap:14px;padding:6px 0}
  .lbl{font-size:11px;color:var(--ink-400);width:96px;flex:none;font-weight:600}
  .lead{font-size:18px;font-weight:500;max-width:480px}
  .body{font-size:16px;font-weight:400;max-width:480px}
  .sm{font-size:14px;color:var(--ink-500)}
  .xs{font-size:12px;color:var(--ink-400);letter-spacing:.04em;text-transform:uppercase;font-weight:700}
</style></head><body>
  <div class="r"><span class="lbl">Lead · 18/500</span><span class="lead">A strong pick, perfectly balanced — recommended by people you trust.</span></div>
  <div class="r"><span class="lbl">Body · 16/400</span><span class="body">Sir Edward the third chose this one carefully. Three friends agree it’s worth your weekend.</span></div>
  <div class="r"><span class="lbl">Small · 14/400</span><span class="sm">237 min · 2024 · added 3 days ago</span></div>
  <div class="r"><span class="lbl">Eyebrow · 12/700</span><span class="xs">Recommended &nbsp;·&nbsp; Popular this week</span></div>
</body></html>
