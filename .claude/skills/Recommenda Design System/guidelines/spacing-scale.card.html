<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale" subtitle="4px base grid — --space-1 … --space-10" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:20px 24px;background:var(--color-bg);font-family:var(--font-sans)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--blue-700);border-radius:4px;width:22px}
  .v{font-size:11px;color:var(--ink-500);font-weight:600;font-variant-numeric:tabular-nums}
  .t{font-size:10px;color:var(--ink-400)}
</style></head><body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><span class="v">4</span><span class="t">1</span></div>
    <div class="col"><div class="bar" style="height:8px"></div><span class="v">8</span><span class="t">2</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="v">12</span><span class="t">3</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="v">16</span><span class="t">4</span></div>
    <div class="col"><div class="bar" style="height:20px"></div><span class="v">20</span><span class="t">5</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="v">24</span><span class="t">6</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="v">32</span><span class="t">7</span></div>
    <div class="col"><div class="bar" style="height:40px"></div><span class="v">40</span><span class="t">8</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="v">48</span><span class="t">9</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="v">64</span><span class="t">10</span></div>
  </div>
</body></html>
