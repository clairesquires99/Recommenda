<!-- @dsCard group="Colors" viewport="700x150" name="Brand blue" subtitle="Royal ink-blue scale — --blue-700 is the primary brand color" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:20px;background:var(--color-bg);font-family:var(--font-sans)}
  .row{display:flex;gap:8px}
  .sw{flex:1;border-radius:var(--radius-md);height:96px;border:1px solid var(--color-border-soft);display:flex;flex-direction:column;justify-content:flex-end;padding:9px;position:relative}
  .name{font-size:12px;font-weight:700}
  .hex{font-size:10px;opacity:.85;font-variant-numeric:tabular-nums;margin-top:1px}
  .star{position:absolute;top:8px;left:9px;font-size:10px;font-weight:700;letter-spacing:.08em}
</style></head><body>
<div class="row">
 <div class="sw" style="background:var(--blue-900);color:var(--cream-100)"><span class="name">900</span><span class="hex">#001A5C</span></div>
 <div class="sw" style="background:var(--blue-800);color:var(--cream-100)"><span class="name">800</span><span class="hex">#001F66</span></div>
 <div class="sw" style="background:var(--blue-700);color:var(--cream-100)"><span class="star">PRIMARY</span><span class="name">700</span><span class="hex">#002A8B</span></div>
 <div class="sw" style="background:var(--blue-600);color:var(--cream-100)"><span class="name">600</span><span class="hex">#173BA0</span></div>
 <div class="sw" style="background:var(--blue-500);color:var(--cream-100)"><span class="name">500</span><span class="hex">#2E50C0</span></div>
 <div class="sw" style="background:var(--blue-200);color:var(--ink-800)"><span class="name">200</span><span class="hex">#B9C4EA</span></div>
 <div class="sw" style="background:var(--blue-100);color:var(--ink-800)"><span class="name">100</span><span class="hex">#DDE3F5</span></div>
 <div class="sw" style="background:var(--blue-50);color:var(--ink-800)"><span class="name">50</span><span class="hex">#EEF1FB</span></div>
</div>
</body></html>
