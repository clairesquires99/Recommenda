<!-- @dsCard group="Colors" viewport="700x150" name="Ink & neutrals" subtitle="Warm near-blacks and greys — line art and text" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:20px;background:var(--color-bg);font-family:var(--font-sans)}
  .row{display:flex;gap:8px}
  .sw{flex:1;border-radius:var(--radius-md);height:96px;border:1px solid var(--color-border-soft);display:flex;flex-direction:column;justify-content:flex-end;padding:9px;position:relative}
  .name{font-size:12px;font-weight:700}
  .hex{font-size:10px;opacity:.85;font-variant-numeric:tabular-nums;margin-top:1px}
  .star{position:absolute;top:8px;left:9px;font-size:10px;font-weight:700;letter-spacing:.06em}
</style></head><body>
<div class="row">
 <div class="sw" style="background:var(--ink-900);color:var(--cream-100)"><span class="star">LINE ART</span><span class="name">ink-900</span><span class="hex">#1B1A1F</span></div>
 <div class="sw" style="background:var(--ink-800);color:var(--cream-100)"><span class="name">ink-800</span><span class="hex">#232026</span></div>
 <div class="sw" style="background:var(--ink-700);color:var(--cream-100)"><span class="star">HEADINGS</span><span class="name">ink-700</span><span class="hex">#292A31</span></div>
 <div class="sw" style="background:var(--ink-500);color:var(--cream-100)"><span class="name">ink-500</span><span class="hex">#6B675F</span></div>
 <div class="sw" style="background:var(--ink-400);color:var(--cream-100)"><span class="name">ink-400</span><span class="hex">#928D83</span></div>
 <div class="sw" style="background:var(--ink-300);color:var(--ink-900)"><span class="name">ink-300</span><span class="hex">#B6B0A4</span></div>
</div>
</body></html>
