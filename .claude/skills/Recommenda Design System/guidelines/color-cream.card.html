<!-- @dsCard group="Colors" viewport="700x150" name="Paper & cream" subtitle="Warm off-white surfaces — --cream-100 is the page background" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:20px;background:var(--color-bg);font-family:var(--font-sans)}
  .row{display:flex;gap:8px}
  .sw{flex:1;border-radius:var(--radius-md);height:96px;border:1px solid var(--color-border-soft);display:flex;flex-direction:column;justify-content:flex-end;padding:9px;color:var(--ink-800);position:relative}
  .name{font-size:12px;font-weight:700}
  .hex{font-size:10px;opacity:.7;font-variant-numeric:tabular-nums;margin-top:1px}
  .star{position:absolute;top:8px;left:9px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--ink-500)}
</style></head><body>
<div class="row">
 <div class="sw" style="background:var(--cream-50)"><span class="name">cream-50</span><span class="hex">#FCF8F0</span></div>
 <div class="sw" style="background:var(--cream-100)"><span class="star">PAGE</span><span class="name">cream-100</span><span class="hex">#F8F1E3</span></div>
 <div class="sw" style="background:var(--cream-200)"><span class="name">cream-200</span><span class="hex">#F1E8D6</span></div>
 <div class="sw" style="background:var(--cream-300)"><span class="name">cream-300</span><span class="hex">#E8DDC7</span></div>
 <div class="sw" style="background:var(--taupe-200)"><span class="name">taupe-200</span><span class="hex">#D7D0C2</span></div>
 <div class="sw" style="background:var(--white)"><span class="name">white</span><span class="hex">#FFFFFF</span></div>
</div>
</body></html>
