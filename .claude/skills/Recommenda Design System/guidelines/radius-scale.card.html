<!-- @dsCard group="Spacing" viewport="700x170" name="Radius" subtitle="Soft & friendly — buttons are full pills, cards 24–28px" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:20px 24px;background:var(--color-bg);font-family:var(--font-sans)}
  .row{display:flex;gap:14px;align-items:flex-start}
  .col{display:flex;flex-direction:column;align-items:center;gap:7px}
  .box{width:78px;height:64px;background:var(--cream-50);border:2px solid var(--ink-900);border-bottom:none}
  .pill{width:90px;height:40px;background:var(--blue-700);border-radius:999px}
  .v{font-size:11px;color:var(--ink-700);font-weight:700}
  .t{font-size:10px;color:var(--ink-400)}
</style></head><body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:8px 8px 0 0"></div><span class="v">8</span><span class="t">xs</span></div>
    <div class="col"><div class="box" style="border-radius:12px 12px 0 0"></div><span class="v">12</span><span class="t">sm</span></div>
    <div class="col"><div class="box" style="border-radius:16px 16px 0 0"></div><span class="v">16</span><span class="t">md</span></div>
    <div class="col"><div class="box" style="border-radius:24px 24px 0 0"></div><span class="v">24</span><span class="t">lg</span></div>
    <div class="col"><div class="box" style="border-radius:28px 28px 0 0"></div><span class="v">28</span><span class="t">card</span></div>
    <div class="col"><div class="pill"></div><span class="v">999</span><span class="t">pill</span></div>
  </div>
</body></html>
