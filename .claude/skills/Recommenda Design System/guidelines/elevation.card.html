<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:24px;background:var(--color-bg);font-family:var(--font-sans)}
  .row{display:flex;gap:16px;align-items:center}
  .card{flex:1;height:96px;background:var(--cream-50);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ink-500);text-align:center;padding:8px}
  .b{border:2px solid var(--ink-900)}
  .s-sm{box-shadow:var(--shadow-sm)}
  .s-md{box-shadow:var(--shadow-md)}
  .s-photo{box-shadow:var(--shadow-photo)}
</style></head><body>
  <div class="row">
    <div class="card b">border-bold<br>2px ink — default</div>
    <div class="card s-sm">shadow-sm<br>overlays</div>
    <div class="card s-md">shadow-md<br>menus / sheets</div>
    <div class="card s-photo">shadow-photo<br>floating product art</div>
  </div>
</body></html>
