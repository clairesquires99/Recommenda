<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--color-bg);font-family:var(--font-sans)}
  .stack{display:flex;flex-direction:column;gap:18px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .cap{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400);width:100%;margin-bottom:-6px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton } = window.RecommendaDesignSystem_f7975c;
const Heart = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.8 5.6a5 5 0 0 0-7.1 0L12 7.3l-1.7-1.7a5 5 0 1 0-7.1 7.1L12 21l8.8-8.3a5 5 0 0 0 0-7.1Z"/></svg>);
const Arrow = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>);
function Demo(){
  return (
    <div className="stack">
      <div className="row">
        <span className="cap">Variants</span>
        <Button variant="primary">Add to shelf</Button>
        <Button variant="secondary">Skip</Button>
        <Button variant="ink">Following</Button>
        <Button variant="ghost" trailingIcon={<Arrow/>}>See all</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div className="row">
        <span className="cap">Sizes</span>
        <Button size="sm">Small</Button>
        <Button size="md">Medium</Button>
        <Button size="lg">Large</Button>
      </div>
      <div className="row">
        <span className="cap">Icon buttons</span>
        <IconButton ariaLabel="back" variant="outline"><Arrow/></IconButton>
        <IconButton ariaLabel="save" variant="ghost" active><Heart/></IconButton>
        <IconButton ariaLabel="save" variant="solid"><Heart/></IconButton>
        <IconButton ariaLabel="save" variant="ghost"><Heart/></IconButton>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
