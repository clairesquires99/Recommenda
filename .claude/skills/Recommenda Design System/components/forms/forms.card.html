<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--color-bg);font-family:var(--font-sans)}
  .stack{display:flex;flex-direction:column;gap:16px;max-width:420px}
  .cap{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { Input, Textarea, SegmentedControl } = window.RecommendaDesignSystem_f7975c;
const Search = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>);
function Demo(){
  const [tab,setTab]=React.useState('books');
  return (
    <div className="stack">
      <span className="cap">Search · pill</span>
      <Input shape="pill" placeholder="Search books & films" leadingIcon={<Search/>} />
      <span className="cap">Field · rounded</span>
      <Input placeholder="Title" defaultValue="Vietnamese Cold Coffee" />
      <span className="cap">Segmented toggle</span>
      <SegmentedControl fullWidth value={tab} onChange={setTab}
        options={[{label:'Books',value:'books'},{label:'Films',value:'films'}]} />
      <span className="cap">Note</span>
      <Textarea rows={3} placeholder="Tell them why they'll love it…" />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
