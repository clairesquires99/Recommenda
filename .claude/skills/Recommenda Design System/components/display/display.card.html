<!-- @dsCard group="Components" viewport="700x340" name="Cards, badges & avatars" subtitle="MediaCard feed unit plus badges, tags and avatars" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--color-bg);font-family:var(--font-sans)}
  .stack{display:flex;flex-direction:column;gap:16px;max-width:440px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .cap{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { MediaCard, Badge, Tag, Avatar } = window.RecommendaDesignSystem_f7975c;
function Demo(){
  const [saved,setSaved]=React.useState(true);
  const [g,setG]=React.useState('Sci-fi');
  return (
    <div className="stack">
      <MediaCard title="Dune" creator="Frank Herbert" type="Book"
        coverColor="var(--blue-700)"
        recommenderName="Mia R."
        note="The desert chapters live in my head rent-free."
        saved={saved} onToggleSave={()=>setSaved(!saved)} />
      <span className="cap">Badges</span>
      <div className="row">
        <Badge variant="accent" uppercase>Recommended</Badge>
        <Badge variant="solid">Popular</Badge>
        <Badge variant="neutral" size="sm">2024</Badge>
        <Badge variant="outline" size="sm">Film</Badge>
      </div>
      <span className="cap">Tags</span>
      <div className="row">
        {['Sci-fi','Thriller','Memoir'].map(t=>(<Tag key={t} selected={g===t} onClick={()=>setG(t)}>{t}</Tag>))}
        <Tag onRemove={()=>{}}>Cozy</Tag>
      </div>
      <span className="cap">Avatars</span>
      <div className="row">
        <Avatar size="lg" name="Sir Edward" ring />
        <Avatar size="md" name="Mia Rose" />
        <Avatar size="sm" name="Jon K" />
        <Avatar size="xs" name="Ava" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
